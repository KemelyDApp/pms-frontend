<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1440, initial-scale=1"/>
  <title>Kemely PMS — Portfolio Management System</title>
  <link rel="stylesheet" href="styles/colors_and_type.css"/>
  <link rel="stylesheet" href="styles/pms.css"/>
  <link rel="stylesheet" href="styles/dashboard.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    const PMS_TWEAKS = /*EDITMODE-BEGIN*/{
      "density": "comfortable",
      "currency": "USD",
      "accent": "purple"
    }/*EDITMODE-END*/;
    window.PMS_TWEAKS_DEFAULTS = PMS_TWEAKS;
  </script>
  <script src="data.js"></script>
  <script src="data-v2.js"></script>
  <script src="dashboard-data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="sidebar.jsx"></script>
  <script type="text/babel" src="page-overview.jsx"></script>
  <script type="text/babel" src="page-investor-detail.jsx"></script>
  <script type="text/babel" src="dashboard-widgets.jsx"></script>
  <script type="text/babel" src="page-dashboard.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="pages-v2.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    function App() {
      const [active, setActive] = React.useState('overview');
      const [poolId, setPoolId] = React.useState(null);
      const [tweaks, setTweak] = useTweaks(window.PMS_TWEAKS_DEFAULTS);
      const ccy = tweaks.currency;

      React.useEffect(() => {
        document.documentElement.setAttribute('data-density', tweaks.density);
        document.documentElement.setAttribute('data-accent', tweaks.accent);
      }, [tweaks.density, tweaks.accent]);

      const labels = {
        overview:'Overview', positions:'Positions', blotter:'Orders & blotter',
        pnl:'P&L attribution', firm:'Firm P&L', strategies:'Strategies', bots:'Bots & sagas',
        fundflow:'Fund flow', investors:'Investors',
        risk:'Risk & limits', recon:'Reconciliation', venues:'Counterparties',
        transfers:'Transfers', reports:'Reports', admin:'Admin'
      };

      const goTo = (id) => { setActive(id); setPoolId(null); };
      const openPool = (id) => { setActive('strategies'); setPoolId(id); };

      const pageMap = {
        overview: <DashboardPage ccy={ccy} onOpenPool={openPool}/>,
        positions: <PositionsPage ccy={ccy}/>,
        blotter: <BlotterPage/>,
        pnl: <PnlPage/>,
        firm: <FirmPnlPage/>,
        strategies: poolId ? <PoolDetailPage poolId={poolId} onBack={()=>setPoolId(null)}/> : <StrategiesPage onSelect={setPoolId}/>,
        bots: <BotsPage/>,
        fundflow: <FundFlowPage/>,
        investors: <InvestorsPage/>,
        risk: <RiskPage/>,
        recon: <ReconPage/>,
        venues: <VenuesPage/>,
        transfers: <TransfersPage/>,
        reports: <ReportsPage/>,
        admin: <AdminPage/>,
      };

      const crumbLabel = labels[active] + (active==='strategies' && poolId ? ' / ' + (POOLS.find(p=>p.id===poolId)?.name || '') : '');

      return (
        <div className="pms-app" data-screen-label={crumbLabel}>
          <Sidebar active={active} onNav={goTo}/>
          <TopBar crumbs={['Kemely PMS', crumbLabel]} ccy={ccy} setCcy={(c)=>setTweak('currency', c)}/>
          <main className="pms-main">
            <div className="pms-page">
              {pageMap[active]}
            </div>
          </main>
          <TweaksPanel title="Tweaks">
            <TweakSection title="Display">
              <TweakRadio label="Density" value={tweaks.density} options={[{label:'Comfortable',value:'comfortable'},{label:'Compact',value:'compact'}]} onChange={v=>setTweak('density', v)}/>
              <TweakRadio label="Currency" value={tweaks.currency} options={[{label:'USD',value:'USD'},{label:'USDC',value:'USDC'},{label:'BTC',value:'BTC'}]} onChange={v=>setTweak('currency', v)}/>
              <TweakRadio label="Brand accent" value={tweaks.accent} options={[{label:'Purple',value:'purple'},{label:'Orange',value:'orange'}]} onChange={v=>setTweak('accent', v)}/>
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
